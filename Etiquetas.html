<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página de Juan Inés</title>

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background-color: #f4f6f8;
    margin: 0;
    padding: 0;
    text-align: center;
}

h1{
    background-color: #111;
    color: white;
    padding: 20px;
    margin: 0;
}

ul{
    list-style: none;
    padding: 0;
}

.moto{
    margin: 20px auto;
    background: white;
    width: 420px;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 8px 18px rgba(0,0,0,0.15);
}

.moto img{
    width: 100%;
    border-radius: 8px;
}

a{
    text-decoration: none;
    color: #0077cc;
    font-weight: bold;
}

table{
    margin: 30px auto;
    border-collapse: collapse;
}

td{
    height: 40px;
    width: 60px;
    border: 2px solid #333;
}
</style>
</head>

<body>

<h1>Página de Juan Inés</h1>

<ul>

    <li class="moto">

    </li>

    <li class="moto">
        <h3>Kawasaki Ninja H2</h3>
        <img src="https://www.kawasaki.com/content/dam/kawasaki/en_us/motorcycle/ninja-h2/gallery/21MY_Ninja_H2_Action_01.jpg">
    </li>

    <li class="moto">
        <h3>Ducati Panigale V4</h3>
        <img src="https://images.ctfassets.net/x7j9qwvpvr5s/6gk9d2J6p0F0z8e5G5r3eA/8c2a7c4e6a3b88b6a8d1c8e3a1c1d5f6/Ducati-Panigale-V4-2022.jpg">
    </li>

    <li class="moto">
        <h3>BMW S1000RR</h3>
        <img src="https://www.bmw-motorrad.com/content/dam/bmwmotorradnsc/common/multiimages/images/models/s-series/s1000rr/2023/23_s1000rr_P0N3E_driving.jpg">
    </li>

    <li class="moto">
        <h3>Suzuki GSX-R1000</h3>
        <img src="https://www.suzuki.com.mx/sites/default/files/styles/large/public/2023-05/GSX-R1000R.jpg">

</ul>
