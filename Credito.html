<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Evaluación de Crédito</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery UI (para autocomplete) -->
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">

    <link rel="stylesheet" href="estilos.css">
</head>

<body>

<div class="contenedor-principal">
    <div class="card shadow tarjeta">
        <div class="card-header bg-primary text-white text-center">
            <h5 class="mb-0">Evaluación de Crédito</h5>
        </div>

        <div class="card-body">
            <form id="formCredito">

                <div class="mb-2">
                    <label class="form-label">Edad</label>
                    <input type="number" class="form-control form-control-sm" id="edad" required>
                </div>

                <div class="mb-2">
                    <label class="form-label">País de nacimiento</label>
                    <input type="text" class="form-control form-control-sm" id="pais">
                </div>

                <div class="mb-2">
                    <label class="form-label">Ingresos mensuales</label>
                    <input type="number" class="form-control form-control-sm" id="ingresos" required>
                </div>

                <!-- Buró automático -->
                <div class="mb-2">
                    <label class="form-label">Buró de crédito</label>
                    <input type="text" class="form-control form-control-sm" id="buro" readonly>
                </div>

                <!-- Score -->
                <div class="mb-3">
                    <label class="form-label">
                        Score: <span id="valorScore" class="fw-bold">650</span>
                    </label>
                    <input type="range" class="form-range" id="score"
                           min="400" max="850" value="650">
                </div>

                <div class="mb-2">
                    <label class="form-label">Monto del préstamo</label>
                    <input type="number" class="form-control form-control-sm" id="monto" required>
                </div>

                <div class="mb-2">
                    <label class="form-label">
                        Número de meses: <span id="valorMeses" class="fw-bold text-primary">12</span>
                    </label>
                    <input type="range" class="form-range" id="meses"
                           min="12" max="60" step="12" value="12">
                </div>

                <div class="mb-3">
                    <label class="form-label">Tasa de Interés Anual (%)</label>
                    <input type="number" class="form-control form-control-sm" id="tasaAnual" readonly>
                </div>

                <button type="button" class="btn btn-success btn-sm w-100" onclick="evaluarCredito()">
                    Evaluar Crédito
                </button>

            </form>

            <div class="mt-3">
                <div id="resultado" class="alert d-none p-2 small"></div>
            </div>

        </div>
    </div>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- jQuery UI -->
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

<script src="script.js"></script>

</body>
</html>
